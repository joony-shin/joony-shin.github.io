baseURL = "https://joony-shin.github.io/"
locale = "ko-kr"
defaultContentLanguage = "ko"
title = "joony-shin blog"
theme = "PaperMod"

# 페이지네이션 (글이 쌓이는 자동 블로그 → 목록 분할)
[pagination]
  pagerSize = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

# RSS/sitemap 전체 글 노출 (robots = robots.txt, JSON = PaperMod 검색 인덱스)
[outputs]
  home = ["HTML", "RSS", "JSON", "robots"]

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"        # robots, OpenGraph, schema.org 메타 활성화
  title = "joony-shin blog"
  description = "국내외 정치·경제계 주요 인사들의 SNS 발언을 한국어로 정리하고 해설합니다."
  keywords = ["정치", "경제", "트럼프", "미국정치", "SNS", "트루스소셜", "금융위", "한국어 브리핑"]
  author = "joony-shin"
  defaultTheme = "auto"     # light/dark 자동
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false

  # ── Google AdSense ──────────────────────────────────────────
  # 승인 후 발급받은 ca-pub-XXXXXXXXXXXXXXXX 로 교체하세요.
  # 비어 있으면 광고 스크립트가 출력되지 않습니다(승인 전 안전).
  googleAdsenseClient = ""

  [params.homeInfoParams]
    Title = "👋 안녕하세요"
    Content = "국내외 정치·경제계 영향력 있는 인사들의 SNS 발언을 한국어로 빠르게 전합니다."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/joony-shin"

  # ── 검색엔진 소유 확인(사이트 검증) ─────────────────────────────
  # 코드만 붙이면 <head> 에 메타태그가 자동 출력됩니다(빈 값이면 미출력).
  [params.analytics.google]
    # Google Search Console → 속성 추가 → "HTML 태그" 방식의 content 값
    SiteVerificationTag = "w8zYChnjT1PS4VaUc6ELFPooYfVSP3x4aIcC2aK3knQ"
  [params.analytics.naver]
    # 네이버 서치어드바이저(searchadvisor.naver.com) → 사이트 등록 → 메타태그 content 값
    SiteVerificationTag = "edcaab4a26039086370a5a5a83f2d10def619423"
  [params.analytics.bing]
    SiteVerificationTag = ""

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true   # 본문에 광고 스니펫 등 raw HTML 허용

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "글"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "태그"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "search"
    name = "검색"
    url = "/search/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "소개"
    url = "/about/"
    weight = 40

# ── Google Analytics 4 (유입 추적) ─────────────────────────────
# GA4 측정 ID(G-XXXXXXX)를 넣으면 모든 페이지에 추적 스크립트가 자동 삽입됩니다.
# 비어 있으면 출력되지 않습니다.
[services.googleAnalytics]
#  ID = "G-1Y2P9NNLTD"
  ID = "G-DK8N3G0G7Z"
