baseURL = "https://joony-shin.github.io/"
locale = "ko-kr"
defaultContentLanguage = "ko"
title = "joony-shin blog"
theme = "PaperMod"

# 페이지네이션 (글이 쌓이는 자동 블로그 → 목록 분할)
[pagination]
  pagerSize = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

# RSS/sitemap 전체 글 노출 (robots = robots.txt, JSON = PaperMod 검색 인덱스)
[outputs]
  home = ["HTML", "RSS", "JSON", "robots"]

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"        # robots, OpenGraph, schema.org 메타 활성화
  title = "joony-shin blog"
  description = "정치인·중앙은행·경제학자의 공개 발언을 투자자 관점으로 해석합니다. 발언이 어떤 자산·섹터에 영향을 주는지 정리하고, 예측을 실제 시세와 대조해 기록합니다."
  keywords = ["투자", "시장분석", "정치와 시장", "트럼프", "연준", "금리", "유가", "투자 시그널", "발언 분석"]
  author = "joony-shin"
  defaultTheme = "auto"     # light/dark 자동
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false

  # ── Google AdSense ──────────────────────────────────────────
  # 승인 후 발급받은 ca-pub-XXXXXXXXXXXXXXXX 로 교체하세요.
  # 비어 있으면 광고 스크립트가 출력되지 않습니다(승인 전 안전).
  googleAdsenseClient = "ca-pub-9746752487835793"

  [params.homeInfoParams]
    Title = "📈 발언을 시그널로"
    Content = """정치인·중앙은행·경제학자의 공개 발언을 **투자자 관점**으로 해석합니다.
각 글은 발언 요약·해설에 더해 영향받는 자산·섹터와 방향을 정리하고,
지난 예측은 실제 시세와 대조해 **적중 여부를 기록**합니다.
정치적 수사와 실제 시장 변수를 구분하는 것이 이 블로그의 원칙입니다."""

  # 푸터: 필수 페이지 링크 (AdSense 심사 시 접근성 확인 대상)
  [params.footer]
    text = "[소개](/about/) · [개인정보처리방침](/privacy/)"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/joony-shin"

  # ── 검색엔진 소유 확인(사이트 검증) ─────────────────────────────
  # 코드만 붙이면 <head> 에 메타태그가 자동 출력됩니다(빈 값이면 미출력).
  [params.analytics.google]
    # Google Search Console → 속성 추가 → "HTML 태그" 방식의 content 값
    SiteVerificationTag = "w8zYChnjT1PS4VaUc6ELFPooYfVSP3x4aIcC2aK3knQ"
  [params.analytics.naver]
    # 네이버 서치어드바이저(searchadvisor.naver.com) → 사이트 등록 → 메타태그 content 값
    SiteVerificationTag = "edcaab4a26039086370a5a5a83f2d10def619423"
  [params.analytics.bing]
    SiteVerificationTag = ""

# ── Taxonomy (분류 체계) ───────────────────────────────────────
# 인물 태그(tags)와 별개로, 투자 관점에서 자동 추출되는
# 섹터(sectors)·자산(assets)을 독립 분류로 두어 "에너지 섹터 영향 뉴스",
# "유가 관련 발언" 처럼 자산 중심 탐색이 가능하게 한다.
# asset 의 복수형을 "asset" 으로 둬 URL 을 /asset/ 으로 만든다.
# (PaperMod 가 정적 리소스를 /assets/css, /assets/js 로 발행하므로 /assets/ 회피)
[taxonomies]
  tag = "tags"
  sector = "sectors"
  asset = "asset"

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true   # 본문에 광고 스니펫 등 raw HTML 허용

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "글"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "sectors"
    name = "섹터"
    url = "/sectors/"
    weight = 20
  [[menu.main]]
    identifier = "assets"
    name = "자산"
    url = "/asset/"
    weight = 30
  [[menu.main]]
    identifier = "tags"
    name = "태그"
    url = "/tags/"
    weight = 40
  [[menu.main]]
    identifier = "search"
    name = "검색"
    url = "/search/"
    weight = 50
  [[menu.main]]
    identifier = "about"
    name = "소개"
    url = "/about/"
    weight = 60

# ── Google Analytics 4 (유입 추적) ─────────────────────────────
# GA4 측정 ID(G-XXXXXXX)를 넣으면 모든 페이지에 추적 스크립트가 자동 삽입됩니다.
# 비어 있으면 출력되지 않습니다.
[services.googleAnalytics]
#  ID = "G-1Y2P9NNLTD"
  ID = "G-DK8N3G0G7Z"
